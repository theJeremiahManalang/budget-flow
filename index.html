<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Inventory Remote</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --text: #e8e8e8;
      --muted: #555;
      --accent: #c8f060;
      --red: #ff4d4d;
      --radius: 12px;
      --font-mono: 'DM Mono', monospace;
      --font: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ─── PIN SCREEN ─── */
    #pin-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      gap: 40px;
      padding: 24px;
    }

    .pin-logo {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .pin-dots {
      display: flex;
      gap: 16px;
    }

    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid var(--muted);
      transition: all 0.15s;
    }

    .pin-dot.filled {
      background: var(--accent);
      border-color: var(--accent);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    .pin-dots.shake { animation: shake 0.4s ease; }

    .pin-grid {
      display: grid;
      grid-template-columns: repeat(3, 72px);
      grid-template-rows: repeat(4, 72px);
      gap: 10px;
    }

    .pin-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.1s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pin-btn:active { background: #1e1e1e; transform: scale(0.95); }
    .pin-btn.ok { background: var(--accent); color: #000; font-size: 16px; border-color: var(--accent); }
    .pin-btn.del { font-size: 16px; }

    /* ─── APP SCREEN ─── */
    #app-screen {
      display: none;
      flex-direction: column;
      min-height: 100dvh;
    }

    .app-header {
      padding: 52px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .app-title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-add {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-add:active { opacity: 0.8; }

    .btn-refresh {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── SEARCH ─── */
    .search-bar {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
    }

    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: #333; }

    /* ─── CATEGORIES ─── */
    #cat-bar {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }

    #cat-bar::-webkit-scrollbar { display: none; }

    .cat-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.05em;
      padding: 5px 12px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.15s;
    }

    .cat-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }

    /* ─── LIST ─── */
    #item-list {
      flex: 1;
      padding: 12px 20px 100px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }

    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .item-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .item-name {
      font-size: 15px;
      font-weight: 400;
    }

    .item-qty {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--accent);
    }

    .item-qty.qty-zero { color: var(--red); }

    .item-sub {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .item-cat {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .item-price {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
    }

    .item-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .btn-icon {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      width: 36px;
      height: 36px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
    }

    .btn-icon:active { background: #1e1e1e; }
    .btn-edit { color: var(--muted); font-size: 14px; }
    .btn-del { color: var(--red); border-color: #2a1515; }

    .empty {
      text-align: center;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      padding: 60px 0;
    }

    /* ─── MODAL ─── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: flex-end;
    }

    .modal-sheet {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 90dvh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    #modal-title {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .modal-close {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      width: 30px;
      height: 30px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field input, .field textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      padding: 12px;
      outline: none;
      width: 100%;
    }

    .field input:focus, .field textarea:focus { border-color: #333; }

    .field textarea { resize: none; height: 70px; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .btn-submit {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }

    .btn-submit:active { opacity: 0.8; }

    /* ─── LOADING ─── */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .loader {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: all 0.25s;
      z-index: 300;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-ok { border-color: #1e2e10; color: var(--accent); }
    .toast-error { border-color: #2a1515; color: var(--red); }
  </style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <span class="pin-logo">Inventory Remote</span>
  <div class="pin-dots">
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
    <div class="pin-dot"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="handlePin('1')">1</button>
    <button class="pin-btn" onclick="handlePin('2')">2</button>
    <button class="pin-btn" onclick="handlePin('3')">3</button>
    <button class="pin-btn" onclick="handlePin('4')">4</button>
    <button class="pin-btn" onclick="handlePin('5')">5</button>
    <button class="pin-btn" onclick="handlePin('6')">6</button>
    <button class="pin-btn" onclick="handlePin('7')">7</button>
    <button class="pin-btn" onclick="handlePin('8')">8</button>
    <button class="pin-btn" onclick="handlePin('9')">9</button>
    <button class="pin-btn del" onclick="handlePin('del')">⌫</button>
    <button class="pin-btn" onclick="handlePin('0')">0</button>
    <button class="pin-btn ok" onclick="handlePin('ok')">OK</button>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <header class="app-header">
    <span class="app-title">Inventory</span>
    <div class="header-right">
      <button class="btn-refresh" onclick="loadInventory()">↻</button>
      <button class="btn-add" onclick="openEdit(null)">+ Add</button>
    </div>
  </header>

  <div class="search-bar">
    <input class="search-input" type="search" placeholder="Search items…"
      oninput="searchQuery=this.value; renderList()" />
  </div>

  <div id="cat-bar"></div>
  <div id="item-list"></div>
</div>

<!-- MODAL -->
<div id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet">
    <div class="modal-header">
      <span id="modal-title">Add Item</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="field" style="display:none">
      <input id="f-id" type="text" />
    </div>

    <div class="field">
      <label>Name *</label>
      <input id="f-name" type="text" placeholder="Product name" />
    </div>

    <div class="field-row">
      <div class="field">
        <label>Category</label>
        <input id="f-cat" type="text" placeholder="e.g. Electronics" />
      </div>
      <div class="field">
        <label>Quantity</label>
        <input id="f-qty" type="number" placeholder="0" min="0" />
      </div>
    </div>

    <div class="field">
      <label>Price</label>
      <input id="f-price" type="number" placeholder="0.00" min="0" step="0.01" />
    </div>

    <div class="field">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Optional notes…"></textarea>
    </div>

    <button class="btn-submit" onclick="submitForm()">Save Item</button>
  </div>
</div>

<!-- LOADING -->
<div id="loading"><div class="loader"></div></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
